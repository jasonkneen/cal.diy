name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Weekly rebuild for security patches (Sunday midnight UTC)
    - cron: '0 0 * * 0'

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/cal-diy
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/cal-diy-api

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    name: Build Web App Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=http://NEXT_PUBLIC_WEBAPP_URL_PLACEHOLDER
            NEXTAUTH_SECRET=placeholder
            CALENDSO_ENCRYPTION_KEY=placeholder
            CALCOM_TELEMETRY_DISABLED=1

  build-api:
    name: Build API v2 Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/v2/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Smoke test against built images
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    if: github.event_name != 'pull_request'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy script in CI mode
        run: |
          # Generate .env for testing
          cat > .env << 'EOF'
          NEXT_PUBLIC_WEBAPP_URL='http://localhost:3000'
          NEXT_PUBLIC_WEBSITE_URL='http://localhost:3000'
          NEXTAUTH_URL='http://localhost:3000/api/auth'
          NEXTAUTH_SECRET='ci-test-secret-not-for-production'
          CALENDSO_ENCRYPTION_KEY='ci-test-key-not-for-production'
          NEXT_PUBLIC_LICENSE_CONSENT='agree'
          POSTGRES_USER=caldiy
          POSTGRES_PASSWORD=testpass
          POSTGRES_DB=caldiy
          DATABASE_HOST=database:5432
          DATABASE_URL='postgresql://caldiy:testpass@database:5432/caldiy'
          REDIS_URL='redis://redis:6379'
          API_PORT=3002
          NODE_ENV=production
          CALCOM_TELEMETRY_DISABLED=1
          EOF

          docker compose up -d database redis
          sleep 10
          docker compose exec -T database pg_isready -U caldiy || exit 1
          echo "✅ Database is healthy"
          docker compose down

      - name: Report
        if: always()
        run: echo "Smoke test complete"
