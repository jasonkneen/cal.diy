# Cal.diy Docker Compose — Production-Ready Deployment
# Usage: ./deploy.sh (or docker compose up -d)

volumes:
  database-data:
  redis-data:

networks:
  stack:
    name: caldiy-stack
    external: false

services:
  database:
    container_name: caldiy-db
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - database-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-caldiy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-caldiy}
    networks:
      - stack
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caldiy} -d ${POSTGRES_DB:-caldiy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: caldiy-redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - stack
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  calcom:
    container_name: caldiy-web
    image: calcom.docker.scarf.sh/calcom/cal.diy
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL}
        NEXT_PUBLIC_API_V2_URL: ${NEXT_PUBLIC_API_V2_URL}
        NEXT_PUBLIC_LICENSE_CONSENT: ${NEXT_PUBLIC_LICENSE_CONSENT}
        NEXT_PUBLIC_WEBSITE_TERMS_URL: ${NEXT_PUBLIC_WEBSITE_TERMS_URL}
        NEXT_PUBLIC_WEBSITE_PRIVACY_POLICY_URL: ${NEXT_PUBLIC_WEBSITE_PRIVACY_POLICY_URL}
        NEXT_PUBLIC_SINGLE_ORG_SLUG: ${NEXT_PUBLIC_SINGLE_ORG_SLUG}
        ORGANIZATIONS_ENABLED: ${ORGANIZATIONS_ENABLED}
        CALCOM_TELEMETRY_DISABLED: ${CALCOM_TELEMETRY_DISABLED}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
        DATABASE_URL: ${DATABASE_URL}
        DATABASE_DIRECT_URL: ${DATABASE_URL}
        CSP_POLICY: ${CSP_POLICY}
    restart: unless-stopped
    networks:
      - stack
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-caldiy}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-caldiy}
      - DATABASE_DIRECT_URL=postgresql://${POSTGRES_USER:-caldiy}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-caldiy}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/providers || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  calcom-api:
    container_name: caldiy-api
    build:
      context: .
      dockerfile: apps/api/v2/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        DATABASE_DIRECT_URL: ${DATABASE_URL}
    restart: unless-stopped
    networks:
      - stack
    ports:
      - "${API_PORT:-3002}:${API_PORT:-3002}"
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - API_PORT=${API_PORT:-3002}
      - API_URL=${API_URL}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-caldiy}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-caldiy}
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER:-caldiy}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-caldiy}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional: Prisma Studio for database inspection (dev only)
